<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Genre — Orpheus</title>
  <link rel="icon" href="https://zsnefaffxvktxbibmqaf.supabase.co/storage/v1/object/public/Covers/sidebar_icons/no%20bg%20orpheus.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <!-- Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase.js"></script>
  <script src="auth-guard.js"></script>
  <link rel="stylesheet" href="responsive-patch.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
</head>

<body>

  <!-- Custom cursor -->
  <div id="cursor"></div>
  <div id="cursor-ring"></div>

  <!-- Background decorations -->
  <div class="bg-geo"></div>
  <div class="bg-circle-2"></div>
  <div class="bg-dots"></div>

  <!-- TOP NAV injected by sidebar.js -->

  <!-- ══ MAIN LAYOUT ══ -->
  <div class="main-layout" style="position:relative;z-index:1;">

    <aside class="sidebar" id="sidebar"></aside>

    <!-- ── MAIN CONTENT ── -->
    <main class="content">

      <div class="page-header">
        <h1 class="page-title">Genre<span>.</span></h1>
        <span class="page-subtitle" id="genreSubtitle">Loading…</span>
      </div>

      <div class="title-divider">
        <div class="divider-dot"></div>
      </div>

      <div class="genre-container">
        <div class="genre-grid" id="genreGrid">
          <!-- Populated dynamically from Supabase "songs" + "genre_icons" tables -->
          <div class="genre-loading-state" id="genreLoadingState"
            style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;gap:14px;padding:60px 0;color:rgba(191,201,209,.4);">
            <div style="display:flex;gap:8px;">
              <span class="genre-dot" style="width:8px;height:8px;border-radius:50%;background:var(--gold,#FF9B51);animation:genre-pulse 1.2s ease-in-out infinite;"></span>
              <span class="genre-dot" style="width:8px;height:8px;border-radius:50%;background:var(--gold,#FF9B51);animation:genre-pulse 1.2s ease-in-out infinite;animation-delay:.2s;"></span>
              <span class="genre-dot" style="width:8px;height:8px;border-radius:50%;background:var(--gold,#FF9B51);animation:genre-pulse 1.2s ease-in-out infinite;animation-delay:.4s;"></span>
            </div>
            <span style="font-family:var(--font-heading,'Orbitron',sans-serif);font-size:.65rem;letter-spacing:.15em;">LOADING GENRES…</span>
          </div>
        </div><!-- /.genre-grid -->
      </div><!-- /.genre-container -->

    </main>
  </div><!-- /.main-layout -->

  <script src="sidebar.js"></script>
  <script src="player.js"></script>
  <style>
    @keyframes genre-pulse { 0%,100%{opacity:.3} 50%{opacity:1} }
  </style>
  <script>
    const _SB_URL = SUPABASE_URL;
    const _SB_KEY = SUPABASE_KEY;

    /* ── Custom cursor ── */
    const cur  = document.getElementById('cursor');
    const ring = document.getElementById('cursor-ring');
    let mx = 0, my = 0, rx = 0, ry = 0;
    document.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; });
    (function loop() {
      rx += (mx - rx) * 0.14; ry += (my - ry) * 0.14;
      cur.style.left = mx + 'px'; cur.style.top = my + 'px';
      ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
      requestAnimationFrame(loop);
    })();

    /* ── Wire hover / tilt effects to a card element ── */
    function wireCardEffects(card) {
      card.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      card.addEventListener('mouseleave', () => {
        document.body.classList.remove('cursor-hover');
        card.style.transform = '';
      });
      card.addEventListener('mousemove', e => {
        const r = card.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width  - 0.5;
        const y = (e.clientY - r.top)  / r.height - 0.5;
        card.style.transform =
          `translateY(-7px) scale(1.03) rotateY(${x * 8}deg) rotateX(${-y * 8}deg)`;
      });
    }

    /* ── Static elements cursor hover ── */
    document.querySelectorAll('.sidebar-item, .search-bar, .avatar-wrapper').forEach(el => {
      el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
      el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
    });

    /* ── Fetch distinct genres from the songs table + icon URLs from genre_icons ── */
    async function loadGenres() {
      const grid = document.getElementById('genreGrid');

      try {
        // 1. Get all distinct genres from the songs table
        const songsRes = await fetch(
          `${_SB_URL}/rest/v1/songs?select=genre&genre=not.is.null&order=genre.asc`,
          { headers: { 'apikey': _SB_KEY, 'Authorization': `Bearer ${_SB_KEY}`, 'Accept': 'application/json' } }
        );
        if (!songsRes.ok) throw new Error('Failed to fetch genres');
        const allRows = await songsRes.json();

        // Deduplicate genres client-side
        const genres = [...new Set(allRows.map(r => r.genre).filter(Boolean))].sort();

        if (!genres.length) {
          grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;
            color:rgba(191,201,209,.35);font-family:var(--font-heading,'Orbitron',sans-serif);
            font-size:.65rem;letter-spacing:.15em;">NO GENRES FOUND — ADD SONGS TO YOUR DATABASE</div>`;
          return;
        }

        // 2. Fetch genre icons from the genre_icons table
        const iconsRes = await fetch(
          `${_SB_URL}/rest/v1/genre_icons?select=genre,icon_url`,
          { headers: { 'apikey': _SB_KEY, 'Authorization': `Bearer ${_SB_KEY}`, 'Accept': 'application/json' } }
        );
        const iconRows = iconsRes.ok ? await iconsRes.json() : [];
        const iconMap = {};
        iconRows.forEach(r => { iconMap[r.genre.toLowerCase()] = r.icon_url; });

        // Update subtitle
        document.getElementById('genreSubtitle').textContent = `${genres.length} categories`;

        // Clear loader
        grid.innerHTML = '';

        // 3. Build each genre card
        for (const genreName of genres) {
          const nameLower = genreName.toLowerCase();
          const iconUrl   = iconMap[nameLower]
            || Object.entries(iconMap).find(([k]) =>
                k.includes(nameLower) || nameLower.includes(k)
               )?.[1]
            || null;

          const card = document.createElement('div');
          card.className = 'genre-card';
          card.title     = genreName;
          card.style.cursor = 'pointer';

          if (iconUrl) {
            const img = document.createElement('img');
            img.src = iconUrl;
            img.alt = genreName;
            img.className = 'genre-icon';
            img.onerror = () => { img.style.display = 'none'; fallback.style.display = 'flex'; };
            card.appendChild(img);
          }

          const fallback = document.createElement('div');
          fallback.className = 'genre-icon';
          fallback.style.cssText = `display:${iconUrl ? 'none' : 'flex'};align-items:center;
            justify-content:center;font-size:3rem;`;
          fallback.textContent = '🎵';
          card.appendChild(fallback);

          const label = document.createElement('div');
          label.className   = 'genre-label';
          label.textContent = genreName;
          card.appendChild(label);

          wireCardEffects(card);

          card.addEventListener('click', () => {
            if (iconUrl) sessionStorage.setItem('orpheus_genre_icon', iconUrl);
            else         sessionStorage.removeItem('orpheus_genre_icon');
            window.location.href = `playing.html?genre=${encodeURIComponent(genreName)}`;
          });

          grid.appendChild(card);
        }

      } catch (err) {
        console.error('Genre load error:', err);
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:60px;
          color:rgba(191,201,209,.35);font-size:.85rem;">Failed to load genres. Check your connection.</div>`;
      }
    }

    loadGenres();
  </script>
<script type="module" src="./accessibility.js"></script>
</body>

</html>
