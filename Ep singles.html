<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORPHEUS — EP & Singles</title>
    <link rel="icon" href="https://zsnefaffxvktxbibmqaf.supabase.co/storage/v1/object/public/Covers/sidebar_icons/no%20bg%20orpheus.svg">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Grotesk:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="home_theme.css">
    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase.js"></script>
    <script src="auth-guard.js"></script>

    <style>
        /* ── EP & Singles page-specific styles ── */
        .eps-page {
            padding: 32px 28px 120px;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Page heading row */
        .eps-header {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 32px;
        }

        .eps-back-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: rgba(191, 201, 209, 0.85);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 8px 16px;
            cursor: pointer;
            transition: background 0.2s, color 0.2s;
            flex-shrink: 0;
        }

        .eps-back-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .eps-title-wrap {
            flex: 1;
        }

        .eps-page-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2rem;
            font-weight: 900;
            letter-spacing: 0.08em;
            color: #fff;
            margin: 0 0 2px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #FF9B51 0%, #ffcf9b 50%, #FF9B51 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .eps-page-subtitle {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.82rem;
            color: rgba(191, 201, 209, 0.5);
            letter-spacing: 0.05em;
        }

        .eps-count-badge {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.78rem;
            font-weight: 600;
            background: linear-gradient(135deg, #FF9B51, #c06020);
            color: #fff;
            border-radius: 20px;
            padding: 4px 14px;
            letter-spacing: 0.04em;
            flex-shrink: 0;
        }

        /* Divider line */
        .eps-divider {
            height: 1px;
            background: linear-gradient(90deg, rgba(255, 155, 81, 0.5), rgba(255, 255, 255, 0.06), transparent);
            margin-bottom: 28px;
        }

        /* Album grid — same card style as home page, but 4 columns */
        .eps-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 16px;
        }

        @media (max-width: 1100px) {
            .eps-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 750px) {
            .eps-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 500px) {
            .eps-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        .eps-card {
            position: relative;
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 1 / 1;
            cursor: pointer;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.35);
        }

        .eps-card:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.55);
        }

        .eps-card img.eps-cover {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .eps-card-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 28px 10px 10px;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.82) 0%, transparent 100%);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.75rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.92);
            text-align: center;
            letter-spacing: 0.02em;
            line-height: 1.3;
            word-break: break-word;
        }

        /* Single badge (top-right corner) */
        .eps-single-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(255, 155, 81, 0.92);
            color: #fff;
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.6rem;
            font-weight: 700;
            letter-spacing: 0.07em;
            padding: 2px 7px;
            border-radius: 8px;
            text-transform: uppercase;
        }

        /* Empty state */
        .eps-empty {
            grid-column: 1 / -1;
            text-align: center;
            color: rgba(191, 201, 209, 0.4);
            font-family: 'Space Grotesk', sans-serif;
            font-size: 0.9rem;
            padding: 60px 0;
        }

        /* Loading skeleton shimmer */
        @keyframes shimmer {
            0% {
                background-position: -400px 0;
            }

            100% {
                background-position: 400px 0;
            }
        }

        .eps-skeleton {
            border-radius: 14px;
            aspect-ratio: 1 / 1;
            background: linear-gradient(90deg,
                    rgba(255, 255, 255, 0.04) 25%,
                    rgba(255, 255, 255, 0.10) 50%,
                    rgba(255, 255, 255, 0.04) 75%);
            background-size: 800px 100%;
            animation: shimmer 1.4s infinite linear;
        }
    </style>
  <link rel="stylesheet" href="responsive-patch.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.1.6/purify.min.js"></script>
</head>

<body>
    <div class="main-layout">
        <main class="page-body">
            <div class="eps-page">

                <!-- Header -->
                <div class="eps-header">
                    <button class="eps-back-btn" onclick="history.back()">← Back</button>
                    <div class="eps-title-wrap">
                        <h1 class="eps-page-title">EP &amp; Single</h1>
                        <p class="eps-page-subtitle">Releases with a single track</p>
                    </div>
                    <div class="eps-count-badge" id="epsCountBadge" style="display:none;"></div>
                </div>

                <div class="eps-divider"></div>

                <!-- Album grid -->
                <div class="eps-grid" id="eps-grid">
                    <!-- Skeleton placeholders while loading -->
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                    <div class="eps-skeleton"></div>
                </div>

            </div>
        </main>
    </div>

    <script src="sidebar.js"></script>
    <script src="player.js"></script>

    <script>
        /* =====================================================
           EP & SINGLES — albums with exactly 1 song
           Tries sessionStorage first (set by home.html),
           then falls back to a fresh Supabase fetch.
           ===================================================== */
        (async function loadEPSingles() {
            /* Credentials from supabase.js globals */

            const grid = document.getElementById('eps-grid');
            const badge = document.getElementById('epsCountBadge');

            const GRAD_COLORS = [
                ['#FF9B51', '#c06020'], ['#25343F', '#3a5060'], ['#2e4455', '#1a2e3a'],
                ['#e07830', '#a04c18'], ['#6a4c93', '#3d2060'], ['#1a4a2a', '#0d2a18'],
                ['#354e5e', '#1e3040'], ['#e53935', '#8a1a18'], ['#283593', '#101d5e'],
                ['#3a6080', '#1a3a54'], ['#c86820', '#8a4010'], ['#4a2040', '#2a0f25'],
            ];

            let singles = null;

            // 1️⃣ Try sessionStorage (fast path — data pre-computed by home.html)
            try {
                const cached = sessionStorage.getItem('orpheus_ep_singles');
                if (cached) singles = JSON.parse(cached);
            } catch (_) { }

            // 2️⃣ Fallback: fetch directly from Supabase
            if (!singles) {
                try {
                    const res = await fetch(
                        `${SUPABASE_URL}/rest/v1/songs?select=album,cover_url&album=not.is.null&order=album.asc`,
                        { headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}`, 'Accept': 'application/json' } }
                    );
                    if (!res.ok) throw new Error('Fetch failed');
                    const rows = await res.json();

                    // Count songs per album
                    const albumMap = {};
                    rows.forEach(r => {
                        if (!r.album) return;
                        if (!albumMap[r.album]) albumMap[r.album] = { coverUrl: r.cover_url || null, count: 0 };
                        albumMap[r.album].count++;
                    });

                    // Keep only single-song albums
                    singles = Object.entries(albumMap)
                        .filter(([, data]) => data.count === 1)
                        .map(([name, data]) => [name, data.coverUrl]);

                } catch (err) {
                    console.error('EP/Singles load error:', err);
                    grid.innerHTML = '<div class="eps-empty">Could not load singles. Please try again later.</div>';
                    return;
                }
            }

            // Render
            if (!singles.length) {
                grid.innerHTML = '<div class="eps-empty">No single-track releases found in the library.</div>';
                return;
            }

            // Show count badge
            badge.textContent = singles.length + ' release' + (singles.length !== 1 ? 's' : '');
            badge.style.display = '';

            grid.innerHTML = DOMPurify.sanitize(singles.map(([albumName, coverUrl], i) => {
                const [c1, c2] = GRAD_COLORS[i % GRAD_COLORS.length];
                return `
        <div class="eps-card" style="background:linear-gradient(135deg,${c1},${c2});" data-album="${albumName}">
          ${coverUrl ? `<img class="eps-cover" src="${coverUrl}" alt="${albumName}" onerror="this.style.display='none'">` : ''}
          <div class="eps-single-badge">Single</div>
          <div class="eps-card-label">${albumName}</div>
        </div>`;
            }).join(''), {ADD_ATTR: ['onerror', 'style']});

            // Click → go to playing.html?album=…
            grid.querySelectorAll('.eps-card').forEach(card => {
                card.addEventListener('click', () => {
                    window.location.href = `playing.html?album=${encodeURIComponent(card.dataset.album)}`;
                });
            });

        })();
    </script>
<script type="module" src="./accessibility.js"></script>
</body>

</html>
